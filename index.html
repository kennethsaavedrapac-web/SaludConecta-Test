<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
  <meta name="theme-color" content="#1877f2">
  <meta name="description" content="Una app similar a Facebook para conectar con amigos">
  <meta name="apple-mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
  <meta name="apple-mobile-web-app-title" content="Facebook">
  <link rel="manifest" href="manifest.json">
  <link rel="icon" type="image/svg+xml" href="data:image/svg+xml,%3Csvg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 36 36' fill='%231877f2'%3E%3Cpath d='M20.18 35.98C28.96 34.42 35.75 26.78 35.75 17.54 35.75 7.5 27.6 0 17.88 0 8.15 0 0 7.5 0 17.54c0 9.24 6.89 16.88 15.67 18.44V22.6h-4.72v-5.06h4.72v-3.86c0-4.65 2.77-7.22 7.02-7.22 2.03 0 4.15.36 4.15.36v4.56h-2.34c-2.3 0-3.02 1.43-3.02 2.9v3.26h5.14l-.82 5.06h-4.32v13.38z'/%3E%3C/svg%3E">
  <title>Facebook</title>
  <link rel="stylesheet" href="css/main.css">
  <link rel="stylesheet" href="css/feed.css">
  <link rel="stylesheet" href="css/profile.css">
  <link rel="stylesheet" href="css/messenger.css">
  <link rel="stylesheet" href="css/notifications.css">
</head>
<body>

  <!-- STATUS BAR -->
  <div id="status-bar">
    <span id="clock">9:41</span>
    <div class="status-icons">
      <svg width="16" height="12" viewBox="0 0 16 12"><rect x="0" y="3" width="3" height="9" fill="white"/><rect x="4" y="2" width="3" height="10" fill="white"/><rect x="8" y="1" width="3" height="11" fill="white"/><rect x="12" y="0" width="3" height="12" fill="white"/></svg>
      <svg width="16" height="12" viewBox="0 0 24 24" fill="white"><path d="M1 1l22 22M16.72 11.06A10.94 10.94 0 0 1 19 12.55M5 12.55a10.94 10.94 0 0 1 5.17-2.39M10.71 5.05A16 16 0 0 1 22.56 9M1.42 9a15.91 15.91 0 0 1 4.7-2.88M8.53 16.11a6 6 0 0 1 6.95 0M12 20h.01"/></svg>
      <svg width="25" height="12" viewBox="0 0 25 12"><rect x="0" y="1" width="22" height="10" rx="2" stroke="white" stroke-width="1.5" fill="none"/><rect x="2" y="3" width="15" height="6" rx="1" fill="white"/><path d="M23 4v4a2 2 0 0 0 0-4z" fill="white"/></svg>
    </div>
  </div>

  <!-- TOP NAV -->
  <header id="topnav">
    <div id="fb-logo">
      <svg width="36" height="36" viewBox="0 0 36 36" fill="white">
        <path d="M20.18 35.98C28.96 34.42 35.75 26.78 35.75 17.54 35.75 7.5 27.6 0 17.88 0 8.15 0 0 7.5 0 17.54c0 9.24 6.89 16.88 15.67 18.44V22.6h-4.72v-5.06h4.72v-3.86c0-4.65 2.77-7.22 7.02-7.22 2.03 0 4.15.36 4.15.36v4.56h-2.34c-2.3 0-3.02 1.43-3.02 2.9v3.26h5.14l-.82 5.06h-4.32v13.38z"/>
      </svg>
    </div>
    <nav id="tab-bar">
      <button class="tab active" data-screen="feed">
        <svg width="24" height="24" viewBox="0 0 24 24" fill="currentColor"><path d="M10 20v-6h4v6h5v-8h3L12 3 2 12h3v8z"/></svg>
      </button>
      <button class="tab" data-screen="friends">
        <svg width="24" height="24" viewBox="0 0 24 24" fill="currentColor"><path d="M16 11c1.66 0 2.99-1.34 2.99-3S17.66 5 16 5c-1.66 0-3 1.34-3 3s1.34 3 3 3zm-8 0c1.66 0 2.99-1.34 2.99-3S9.66 5 8 5C6.34 5 5 6.34 5 8s1.34 3 3 3zm0 2c-2.33 0-7 1.17-7 3.5V19h14v-2.5c0-2.33-4.67-3.5-7-3.5zm8 0c-.29 0-.62.02-.97.05 1.16.84 1.97 1.97 1.97 3.45V19h6v-2.5c0-2.33-4.67-3.5-7-3.5z"/></svg>
      </button>
      <button class="tab" data-screen="marketplace">
        <svg width="24" height="24" viewBox="0 0 24 24" fill="currentColor"><path d="M20 4H4v2l8 5 8-5V4zm0 4.236l-8 5-8-5V20h16V8.236z"/></svg>
      </button>
      <button class="tab" data-screen="notifications">
        <svg width="24" height="24" viewBox="0 0 24 24" fill="currentColor"><path d="M12 22c1.1 0 2-.9 2-2h-4c0 1.1.9 2 2 2zm6-6v-5c0-3.07-1.64-5.64-4.5-6.32V4c0-.83-.67-1.5-1.5-1.5s-1.5.67-1.5 1.5v.68C7.63 5.36 6 7.92 6 11v5l-2 2v1h16v-1l-2-2z"/></svg>
        <span class="badge hidden" id="notif-badge">3</span>
      </button>
      <button class="tab" data-screen="menu">
        <svg width="24" height="24" viewBox="0 0 24 24" fill="currentColor"><path d="M3 18h18v-2H3v2zm0-5h18v-2H3v2zm0-7v2h18V6H3z"/></svg>
      </button>
    </nav>
    <div id="topnav-actions">
      <button class="icon-btn" id="btn-search">
        <svg width="20" height="20" viewBox="0 0 24 24" fill="white"><path d="M15.5 14h-.79l-.28-.27A6.47 6.47 0 0 0 16 9.5 6.5 6.5 0 1 0 9.5 16c1.61 0 3.09-.59 4.23-1.57l.27.28v.79l5 4.99L20.49 19l-4.99-5zm-6 0C7.01 14 5 11.99 5 9.5S7.01 5 9.5 5 14 7.01 14 9.5 11.99 14 9.5 14z"/></svg>
      </button>
      <button class="icon-btn" id="btn-messenger">
        <svg width="20" height="20" viewBox="0 0 24 24" fill="white"><path d="M20 2H4c-1.1 0-2 .9-2 2v18l4-4h14c1.1 0 2-.9 2-2V4c0-1.1-.9-2-2-2z"/></svg>
        <span class="badge hidden" id="msg-badge">2</span>
      </button>
    </div>
  </header>

  <!-- SCREENS -->
  <main id="app">

    <!-- FEED -->
    <section id="screen-feed" class="screen active">
      <div id="stories-bar"><!-- populated by JS --></div>
      <div id="create-post-bar">
        <img src="https://i.pravatar.cc/40?img=12" alt="You" class="avatar">
        <button class="create-post-input">¿Qué estás pensando?</button>
      </div>
      <div id="feed-posts"><!-- populated by JS --></div>
    </section>

    <!-- FRIENDS -->
    <section id="screen-friends" class="screen">
      <div class="screen-header"><h2>Amigos</h2></div>
      <div id="friends-list"><!-- populated by JS --></div>
    </section>

    <!-- MARKETPLACE -->
    <section id="screen-marketplace" class="screen">
      <div class="screen-header"><h2>Marketplace</h2></div>
      <div id="marketplace-grid"><!-- populated by JS --></div>
    </section>

    <!-- NOTIFICATIONS -->
    <section id="screen-notifications" class="screen">
      <div class="screen-header"><h2>Notificaciones</h2></div>
      <div id="notif-list"><!-- populated by JS --></div>
    </section>

    <!-- MENU -->
    <section id="screen-menu" class="screen">
      <div id="menu-profile-row">
        <img src="https://i.pravatar.cc/60?img=12" alt="Tu perfil" class="avatar-lg">
        <div>
          <div class="menu-name">Tu Nombre</div>
          <div class="menu-sub">Ver tu perfil</div>
        </div>
      </div>
      <ul id="menu-list">
        <li data-action="groups"><span class="menu-icon">👥</span> Grupos</li>
        <li data-action="events"><span class="menu-icon">📅</span> Eventos</li>
        <li data-action="saved"><span class="menu-icon">🔖</span> Guardado</li>
        <li data-action="pages"><span class="menu-icon">🏷️</span> Páginas</li>
        <li data-action="settings"><span class="menu-icon">⚙️</span> Configuración</li>
      </ul>
    </section>

    <!-- PROFILE (overlay) -->
    <section id="screen-profile" class="screen overlay hidden">
      <button class="back-btn" data-back>←</button>
      <div id="profile-content"><!-- populated by JS --></div>
    </section>

    <!-- MESSENGER -->
    <section id="screen-messenger" class="screen overlay hidden">
      <button class="back-btn" data-back>←</button>
      <div id="messenger-content"><!-- populated by JS --></div>
    </section>

    <!-- PHOTO VIEWER -->
    <div id="photo-viewer" class="hidden">
      <button id="photo-close">✕</button>
      <img id="photo-img" src="" alt="">
    </div>

    <!-- COMMENTS SHEET -->
    <div id="comments-sheet" class="hidden">
      <div id="comments-header">
        <span>Comentarios</span>
        <button id="comments-close">✕</button>
      </div>
      <div id="comments-list"></div>
      <div id="comments-input-row">
        <img src="https://i.pravatar.cc/32?img=12" alt="You" class="avatar-sm">
        <input type="text" id="comment-input" placeholder="Escribe un comentario…">
        <button id="comment-send">Enviar</button>
      </div>
    </div>
    <div id="comments-backdrop" class="hidden"></div>

    <!-- REACTION PICKER -->
    <div id="reaction-picker" class="hidden">
      <button data-reaction="like">👍</button>
      <button data-reaction="love">❤️</button>
      <button data-reaction="haha">😂</button>
      <button data-reaction="wow">😮</button>
      <button data-reaction="sad">😢</button>
      <button data-reaction="angry">😡</button>
    </div>

    <!-- NOTIFICATION BANNER -->
    <div id="notif-banner" class="hidden"></div>

  </main>

  <script src="js/data.js"></script>
  <script src="js/feed.js"></script>
  <script src="js/profile.js"></script>
  <script src="js/messenger.js"></script>
  <script src="js/notifications.js"></script>
  <script src="js/router.js"></script>
  <script src="js/main.js"></script>
  
  <!-- Register Service Worker for PWA installation -->
  <script>
    if ('serviceWorker' in navigator) {
      window.addEventListener('load', () => {
        navigator.serviceWorker.register('service-worker.js')
          .then((registration) => {
            console.log('Service Worker registrado exitosamente:', registration);
          })
          .catch((error) => {
            console.log('Error al registrar Service Worker:', error);
          });
      });
    }
  </script>
</body>
</html>
